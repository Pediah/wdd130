<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML and CSS Quiz| WDD 130</title>
    <meta name="description" content="Paul Meck's BYU-Idaho WDD 130 QUIZ." />
    <meta name="author" content="Paul Meck">
    <link rel="stylesheet" href="quiz.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>HTML and CSS Quiz</h1>
    </header>
    <main>
        <form action="#" method="post" id="quiz-form">
            <div class="question">
                <label for="q1">What does the acronym Css stand for?</label>
                <input type="text" id="q1" name="q1" required>
            </div>
            <div class="question">
                <label for="q2">What is the purpose of CSS?</label>
                <textarea id="q2" name="q2" rows="4" required></textarea>
            </div>
            <div class="question">
                <label for="q3">Which of the following is NOT a valid HTML tag?</label>
                <select id="q3" name="q3" required>
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="a"> &lt;a&gt; </option>
                    <option value="b"> &lt;div&gt; </option>
                    <option value="c"> &lt;span&gt; </option>
                </select>
            </div>
            <div class="question">
                <label for="q4">How many types of heading elements are available in HTML?</label>
                <input type="number" id="q4" name="q4" min="1" max="6" required>
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>
</html>
